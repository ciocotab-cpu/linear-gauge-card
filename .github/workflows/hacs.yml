name: HACS Action

on:
  push:
    branches:
      - main  # Se il tuo ramo principale si chiama 'master', scrivi 'master'
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *"

jobs:
  hacs:
    name: HACS Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: HACS Action
        uses: "hacs/action@main"
        with:
          category: "plugin" # Fondamentale per le card Lovelace